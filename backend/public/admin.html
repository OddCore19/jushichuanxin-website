<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>聚时传薪问卷后台</title><script src="https://cdn.jsdelivr.net/npm/chart.js"></script><style>:root{--navy:#0B1020;--blue:#173B7A;--gold:#C9A86A;--bg:#EEF7FF;--card:#fff;--line:#D6E5F8;--muted:#637188}*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",Arial,sans-serif;background:linear-gradient(180deg,#EDF7FF,#fff);color:var(--navy)}.wrap{max-width:1180px;margin:0 auto;padding:24px}.top{display:flex;gap:14px;align-items:center;justify-content:space-between;margin-bottom:18px}.brand{display:flex;gap:12px;align-items:center}.brand img{width:96px}.brand h1{font-size:24px;margin:0}.card{background:rgba(255,255,255,.86);border:1px solid var(--line);border-radius:22px;box-shadow:0 18px 44px rgba(23,59,122,.08);padding:18px;margin:16px 0}.login{max-width:420px;margin:16vh auto}.login input{width:100%;padding:14px;border:1px solid var(--line);border-radius:14px;font-size:16px}.btn{border:0;border-radius:14px;padding:12px 16px;font-weight:800;color:#fff;background:linear-gradient(135deg,#173B7A,#5B3FD8);cursor:pointer;text-decoration:none;display:inline-block}.ghost{background:#fff;color:var(--blue);border:1px solid var(--line)}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}.kpi b{display:block;font-size:32px;color:var(--blue)}.charts{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}.chartBox{height:330px}.conclusion li{margin:8px 0}.tableWrap{overflow:auto;max-height:520px;border:1px solid var(--line);border-radius:16px}table{width:100%;border-collapse:collapse;font-size:13px;background:#fff}th,td{padding:10px;border-bottom:1px solid #edf3fb;text-align:left;white-space:nowrap;vertical-align:top}th{position:sticky;top:0;background:#f4f9ff;color:var(--blue);z-index:1}td.long{max-width:300px;white-space:normal}#msg{color:#b00020;margin-top:10px}@media(max-width:860px){.grid,.charts{grid-template-columns:1fr}.top{display:block}.brand img{width:80px}.wrap{padding:14px}}</style></head><body><div class="wrap"><div id="login" class="card login"><div class="brand"><img src="assets/logo.png"><h1>问卷后台登录</h1></div><p>请输入后台密码。</p><input id="pwd" type="password" placeholder="ADMIN_PASSWORD"><p><button class="btn" onclick="login()">登录</button></p><div id="msg"></div></div><div id="dash" style="display:none"><div class="top"><div class="brand"><img src="assets/logo.png"><div><h1>企业品牌诊断问卷后台</h1><div style="color:var(--muted)">数据统计｜可视化分析｜CSV导出</div></div></div><div><a class="btn ghost" href="api/admin/export.csv">导出 CSV</a> <button class="btn" onclick="logout()">退出</button></div></div><div class="grid"><div class="card kpi">提交总量<b id="total">0</b></div><div class="card kpi">平均意向评分<b id="avg">0</b></div><div class="card kpi">高意向客户<b id="hot">0</b></div><div class="card kpi">今日新增<b id="today">0</b></div></div><div class="card conclusion"><h2>自动归纳分析结论</h2><ul id="conclusions"></ul></div><div class="charts"><div class="card chartBox"><canvas id="budget"></canvas></div><div class="card chartBox"><canvas id="services"></canvas></div><div class="card chartBox"><canvas id="problems"></canvas></div><div class="card chartBox"><canvas id="cooperation"></canvas></div><div class="card chartBox"><canvas id="revenue"></canvas></div><div class="card chartBox"><canvas id="missing"></canvas></div></div><div class="card"><h2>原始提交记录</h2><div class="tableWrap"><table id="rows"></table></div></div></div></div><script>let charts=[];function showLogin(){document.getElementById('login').style.display='block';document.getElementById('dash').style.display='none'}function showDash(){document.getElementById('login').style.display='none';document.getElementById('dash').style.display='block'}async function login(){const password=document.getElementById('pwd').value;const r=await fetch('api/admin/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password})});if(r.ok){showDash();load()}else{document.getElementById('msg').textContent='密码错误'}}async function logout(){await fetch('api/admin/logout',{method:'POST'});showLogin()}function chart(id,title,data,type='bar'){const ctx=document.getElementById(id); const labels=data.map(x=>x.name).slice(0,8), values=data.map(x=>x.value).slice(0,8); charts.push(new Chart(ctx,{type,data:{labels,datasets:[{label:title,data:values,borderWidth:1}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},title:{display:true,text:title,font:{size:16}}},scales:type==='bar'?{y:{beginAtZero:true,ticks:{precision:0}}}:{}}}))}function val(v){return Array.isArray(v)?v.join('；'):(v||'')}async function load(){let sr=await fetch('api/admin/stats'); if(sr.status===401){showLogin();return} let st=await sr.json(); let rr=await fetch('api/admin/submissions'); let rows=await rr.json(); document.getElementById('total').textContent=st.total; document.getElementById('avg').textContent=st.averageScore; document.getElementById('hot').textContent=rows.filter(x=>x.score>=70).length; const today=new Date().toISOString().slice(0,10); document.getElementById('today').textContent=rows.filter(x=>x.createdAt.slice(0,10)===today).length; document.getElementById('conclusions').innerHTML=st.conclusions.map(x=>'<li>'+x+'</li>').join(''); charts.forEach(c=>c.destroy()); charts=[]; chart('budget','年度品牌传播投入',st.charts.budget); chart('services','感兴趣服务方向 Top 8',st.charts.services); chart('problems','最大品牌问题 Top 8',st.charts.problems); chart('cooperation','合作模式偏好',st.charts.cooperation); chart('revenue','企业年营收规模',st.charts.revenue); chart('missing','当前最缺少能力',st.charts.missing); const headers=['提交时间','意向评分','企业名称','所属行业','企业年营收规模','年度品牌传播投入','合作模式','感兴趣服务方向','最大品牌问题','联系人姓名','职务','电话微信','邮箱']; const html='<tr>'+headers.map(h=>'<th>'+h+'</th>').join('')+'</tr>'+rows.map(r=>'<tr>'+headers.map(h=>{let v=h==='提交时间'?new Date(r.createdAt).toLocaleString():h==='意向评分'?r.score:r.answers[h]; return '<td class="'+(String(val(v)).length>30?'long':'')+'">'+val(v)+'</td>'}).join('')+'</tr>').join(''); document.getElementById('rows').innerHTML=html;}load();</script></body></html>
