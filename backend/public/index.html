<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>企业品牌资产与企业家影响力诊断问卷｜聚时传薪</title>
  <meta name="description" content="聚时传薪企业品牌资产与企业家影响力诊断问卷" />
  <style>
    :root{--navy:#0D1B2D;--navy2:#07101D;--black:#111111;--gold:#C9A55B;--gold2:#EAD59D;--gray:#A7A9AD;--text:#F7F7F5;--muted:rgba(247,247,245,.72);--card:rgba(13,27,45,.72);--line:rgba(201,165,91,.22);}
    *{box-sizing:border-box} html{scroll-behavior:smooth} body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"HarmonyOS Sans SC","Source Han Sans SC","Noto Sans CJK SC","PingFang SC","Microsoft YaHei",Arial,sans-serif;color:var(--text);background:radial-gradient(circle at 18% 4%,rgba(201,165,91,.14),transparent 34%),radial-gradient(circle at 82% 10%,rgba(167,169,173,.12),transparent 30%),linear-gradient(135deg,var(--black),var(--navy) 58%,var(--navy2));line-height:1.65;}
    .page{max-width:860px;margin:0 auto;padding:0 20px 64px}.hero{min-height:auto;margin:22px 0 18px;padding:22px 18px 24px;display:grid;gap:22px;position:relative;background:linear-gradient(160deg,rgba(13,27,45,.9),rgba(17,17,17,.72));border:1px solid rgba(201,165,91,.18);border-radius:22px;box-shadow:0 20px 56px rgba(0,0,0,.24)}
    .brand{display:flex;align-items:center;gap:12px;font-weight:800;color:var(--text);letter-spacing:.03em}.brand img{width:58px;height:50px;object-fit:contain;display:block}.brandText{font-size:14px;line-height:1.25;color:var(--muted)}.eyebrow{font-size:12px;color:var(--gold2);font-weight:800;letter-spacing:.2em;text-transform:uppercase}h1{margin:10px 0 12px;font-size:clamp(2.7rem,8vw,4.4rem);line-height:1.1;letter-spacing:.08em;color:var(--text);font-family:"STSong","Songti SC","SimSun",serif;font-weight:500}h1 .gold{color:var(--gold)}.subtitle{font-size:18px;font-weight:700;color:rgba(255,255,255,.88);line-height:1.45;margin-bottom:14px;max-width:620px}.lead{padding:16px;border-left:4px solid var(--gold);background:rgba(255,255,255,.04);border-radius:16px;font-size:14px;color:var(--muted);max-width:640px}.cta{display:block;text-align:center;text-decoration:none;color:#111;font-weight:900;background:var(--gold);padding:14px 18px;border-radius:999px;box-shadow:0 18px 42px rgba(201,165,91,.18)}section{margin:20px 0 24px;padding:24px 18px 20px;background:var(--card);border:1px solid rgba(201,165,91,.16);border-radius:22px;box-shadow:0 20px 56px rgba(0,0,0,.24);backdrop-filter: blur(14px)}.secNo{font-size:12px;color:var(--gold2);font-weight:900;letter-spacing:.2em;margin-bottom:5px}h2{margin:0 0 16px;font-size:27px;line-height:1.18;color:var(--text);letter-spacing:0}.q{padding:16px 0;border-top:1px solid rgba(255,255,255,.08)}.q:first-of-type{border-top:0}.qtitle{font-weight:800;color:var(--text);font-size:16px;margin-bottom:10px}.hint{font-size:12px;color:var(--muted);margin-left:4px;font-weight:600}label.option{display:flex;align-items:flex-start;gap:10px;padding:10px 11px;margin:7px 0;border:1px solid rgba(255,255,255,.11);background:rgba(255,255,255,.04);border-radius:12px;font-size:14px;color:rgba(247,247,245,.86)}input[type="radio"],input[type="checkbox"]{width:18px;height:18px;accent-color:var(--gold);margin-top:2px;flex:none}input[type="text"],input[type="email"],textarea{width:100%;border:1px solid rgba(255,255,255,.14);border-radius:12px;padding:13px 12px;font-size:15px;outline:none;background:rgba(17,17,17,.34);color:var(--text);font-family:inherit}input::placeholder,textarea::placeholder{color:rgba(247,247,245,.45)}textarea{min-height:96px;resize:vertical}.other{margin-top:8px}table{width:100%;border-collapse:separate;border-spacing:0;overflow:hidden;border-radius:14px;border:1px solid rgba(255,255,255,.12);font-size:13px;background:rgba(255,255,255,.04)}th,td{padding:10px 6px;border-bottom:1px solid rgba(255,255,255,.1);text-align:center}th:first-child,td:first-child{text-align:left;width:34%;font-weight:800;color:var(--text);padding-left:10px}tr:last-child td{border-bottom:0}th{background:rgba(201,165,91,.12);color:var(--gold2)}.footer{margin:30px 0 20px;text-align:center;color:var(--muted);font-size:13px}.submit{width:100%;border:0;border-radius:999px;padding:17px 18px;font-size:17px;font-weight:900;color:#111;background:var(--gold);box-shadow:0 18px 44px rgba(201,165,91,.2)}.note{font-size:12px;color:var(--muted);text-align:center;margin-top:10px}.result{display:none;margin-top:14px;padding:14px;border-radius:16px;background:rgba(201,165,91,.14);border:1px solid rgba(201,165,91,.32);font-size:14px;color:var(--text)}@media (max-width:390px){h1{font-size:2.45rem}h2{font-size:24px}.page{padding-left:14px;padding-right:14px}.hero,section{padding-left:14px;padding-right:14px}.brand img{width:54px;height:48px}}
  </style>
</head>
<body>
  <main class="page">
    <div class="hero"><div><div class="brand"><img src="assets/logo.png" alt="JSCX 聚时传薪 Logo"><div class="brandText">聚时传薪<br>JSCX</div></div><div class="eyebrow">企业品牌资产诊断</div><h1>让你的企业<br>被<span class="gold">世界</span>看见</h1><div class="subtitle">企业品牌资产与企业家影响力诊断问卷</div><div class="lead">了解企业当前品牌阶段、传播需求、预算区间与核心问题，便于后续提供更精准的品牌资产建设建议。</div></div><a class="cta" href="#form">开始填写</a></div>
    <form id="form"></form><div class="footer">聚时传薪 JSCX｜让真正优秀的企业，被世界看见。</div>
  </main>
  <script>
const sections=[['MODULE 01','企业基本信息',[['企业名称','text'],['所属行业','radio',['AI / 科技','新能源','制造业','教育','医疗健康','消费品牌','金融','文化传媒','政企服务','其他________']],['企业当前发展阶段','radio',['初创期（0–1）','成长期（1–10）','快速扩张期','行业稳定期','转型升级期','准备融资 / 上市','国际化阶段','其他________']],['企业规模','radio',['10 人以下','10–50 人','50–200 人','200–1000 人','1000 人以上','其他________']],['企业年营收规模','radio',['＜300 万元','300 万元～2000 万元','2000 万元～4 亿元','＞4 亿元','其他________']]]],['MODULE 02','企业当前品牌现状',[['最大品牌问题','checkbox',['知名度低','缺少权威背书','企业故事讲不清','创始人没有影响力','搜索结果混乱','百度百科缺失','视频内容质量低','品牌调性不统一','缺少长期内容体系','招商 / 融资缺乏信任感','客户不理解企业价值','团队不会做品牌','其他________']],['目前最缺少','radio',['流量','信任','品牌认知','企业家影响力','行业话语权','内容体系','高端形象','长期品牌资产','其他________']],['品牌团队配置','radio',['没有','1 人兼职负责','1–3 人小团队','完整市场品牌部门','外包为主','其他________']],['品牌传播依赖','checkbox',['公众号','视频号','抖音','小红书','微博','企业创始人个人 IP','当地媒体采访报道','地推销售团队','信息流广告投放','其他________']]]],['MODULE 03','企业家 IP 与创始人影响力',[['是否打造创始人IP','radio',['非常希望','有兴趣但没有方向','暂时没有计划','不确定','其他________']],['企业家公开输出','checkbox',['视频号','抖音','公众号','演讲','媒体采访','行业论坛','基本没有','其他________']],['创始人最大问题','checkbox',['不会表达','不知道说什么','没时间','没有专业团队','缺少传播规划','没有人设定位','不知道如何建立长期影响力','担心过度曝光','其他________']],['企业家IP目标','checkbox',['提升行业影响力','增强客户信任','融资背书','招商合作','招聘人才','企业文化塑造','建立长期个人品牌','成为行业意见领袖','其他________']]]],['MODULE 04','内容与传播需求',[['感兴趣服务方向','checkbox',['企业深度采访','财经报道','权威媒体发布','百度百科','企业宣传片','企业文化片','企业家纪录片','企业家 IP 打造','视频号运营','企业公众号内容','品牌视觉设计','企业活动策划','图书出版','企业文化体系建设','长期品牌顾问服务','其他________']],['偏好内容形式','checkbox',['日常动态公众号视频号等账号发布','权威媒体深度报道','在抖音等主流平台发布爆款品牌视频','企业官网及百度百科编辑维护','企业品牌活动策划','传递品牌调性的视觉化统一 VI 设计','总结沉淀企业成功经验或企业家精神的出版物','其他________']],['优先解决问题','textarea']]],['MODULE 05','企业传播频次与预算',[['年度品牌传播投入','radio',['5 万以内','5–20 万','20–50 万','50–100 万','100 万以上','其他________']],['合作模式','radio',['单次项目合作','按季度合作','年度品牌顾问','长期战略合作','其他________']],['品牌建设最大困难','textarea']]],['MODULE 06','企业文化与长期战略',[['matrix','matrix'],['长期品牌资产意向','radio',['非常重视','正在尝试','还没有系统规划','更关注短期增长','其他________']]]],['MODULE 07','合作意向判断',[['期待合作方能力','checkbox',['深度内容能力','品牌战略能力','媒体资源','企业家 IP 能力','高端视觉','视频制作','长期顾问','活动资源','出版资源','其他________']],['优先沟通内容','textarea']]],['MODULE 08','联系方式',[['联系人姓名','text'],['职务','text'],['电话微信','text'],['邮箱','email']]]];
let qn=1; const form=document.getElementById('form');
function field(label,type,opts){let h='<div class="q"><div class="qtitle">'+(label==='matrix'?'20. 企业是否已经形成明确的以下体系？':(qn++)+'. '+label)+(type==='radio'?' <span class="hint">单选</span>':type==='checkbox'?' <span class="hint">多选</span>':type==='matrix'?' <span class="hint">矩阵单选</span>':'')+'</div>'; if(type==='text'||type==='email') h+=`<input name="${label}" type="${type}">`; else if(type==='textarea') h+=`<textarea name="${label}"></textarea>`; else if(type==='matrix'){const rows=['企业使命','企业价值观','企业文化体系','创始人表达体系','品牌故事','长期品牌战略'];h+='<table><tr><th>项目</th><th>已形成</th><th>不清晰</th><th>完全没有</th></tr>'+rows.map(r=>`<tr><td>${r}</td><td><input type="radio" name="${r}" value="已形成"></td><td><input type="radio" name="${r}" value="不清晰"></td><td><input type="radio" name="${r}" value="完全没有"></td></tr>`).join('')+'</table>'} else {h+=opts.map((o,i)=>{const id=label+i; const other=o.includes('其他'); return `<label class="option" for="${id}"><input id="${id}" type="${type}" name="${label}" value="${o.replace(/_/g,'')}"><span>${o}</span></label>${other?`<input class="other" name="${label}_其他补充" type="text" placeholder="请填写其他内容">`:''}`}).join('')} return h+'</div>'}
sections.forEach(s=>{let html=`<section><div class="secNo">${s[0]}</div><h2>${s[1]}</h2>`; s[2].forEach(x=>html+=field(x[0],x[1],x[2])); if(s[0]==='MODULE 08') html+='<button class="submit" type="submit">提交问卷</button><div class="note">提交后，调研结果将进入聚时传薪后台。</div><div id="result" class="result"></div>'; html+='</section>'; form.insertAdjacentHTML('beforeend',html)});
form.addEventListener('submit',async e=>{e.preventDefault(); const fd=new FormData(form); const data={}; for(const [k,v] of fd.entries()){if(!v) continue; if(data[k]){ if(Array.isArray(data[k])) data[k].push(v); else data[k]=[data[k],v]; } else data[k]=v;} const result=document.getElementById('result'); result.style.display='block'; result.innerHTML='正在提交……'; try{const r=await fetch('api/submit',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)}); const j=await r.json(); if(!r.ok) throw new Error(j.error||'提交失败'); result.innerHTML=`<b>提交成功。</b><br>感谢填写，我们将根据您的品牌阶段与需求方向进一步沟通。`; form.querySelector('.submit').disabled=true; form.querySelector('.submit').textContent='已提交';}catch(err){result.innerHTML='<b>提交失败：</b>'+err.message+'<br>请检查必填项或稍后重试。'} result.scrollIntoView({behavior:'smooth',block:'center'});});
  </script>
</body>
</html>
